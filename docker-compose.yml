services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_started

networks:
  default:
    name: technikwebsite