services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technikwebsite-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - frontend:/dist/frontend

  nginx:
    image: nginx:alpine
    container_name: technikwebsite
    restart: unless-stopped
    volumes:
      - frontend:/dist/frontend:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: technikwebsite-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx
      - backend
    command: tunnel run

volumes:
  frontend:
    name: technikwebsite_frontend

networks:
  default:
    name: technikwebsite